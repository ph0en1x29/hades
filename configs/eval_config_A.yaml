# Config A: locked benchmark for the scoped Hades prototype

experiment:
  id: config_a_locked_local
  name: "Locked Local Benchmark"
  description: "Dataset-gated public benchmark with deterministic triage and a locked test split"

model:
  provider: vllm
  name: moonshotai/Kimi-K2.5
  status: candidate
  deterministic:
    temperature: 0.0
    seed: 42

orchestration:
  mode: deterministic_pipeline

rag:
  enabled: true
  vector_store: qdrant
  retrieval_mode: hybrid
  sources:
    - mitre_attack
    - curated_cve

dataset_preparation:
  raw_sources:
    - name: splunk_attack_data
      type: rule_linked_security_dataset
      dataset_role: benchmark_of_record
      benchmark_eligible: true
      access: public
    - name: splunk_security_content
      type: detection_rule_pack
      dataset_role: supplementary
      benchmark_eligible: false
      access: public
    - name: otrf_security_datasets
      type: telemetry_supplement
      dataset_role: supplementary
      benchmark_eligible: false
      access: public
    - name: evtx_to_mitre_attack
      type: telemetry_supplement
      dataset_role: supplementary
      benchmark_eligible: false
      access: public
    - name: cicids2018
      type: flow_dataset
      dataset_role: engineering_scaffold
      benchmark_eligible: false
      experimental: true
      access: public
  benchmark_of_record:
    source: splunk_attack_data
    rule_pack_source: splunk_security_content
    manifest: data/manifests/public_benchmark_of_record.yaml
    require_rule_associations: true
    require_label_provenance: true
    require_mitre_mappings: true
    label_provenance_policy: splunk_detection_label_v1
    allow_engineering_scaffolds: false
  transform:
    enabled: true
    version: alert_projection_v2
    output_dir: data/benchmarks/normalized
    preserve_raw_reference: true
    require_provenance_fields: true
    exclude_engineering_scaffolds_from_benchmark: true

split_policy:
  strategy: scenario_holdout
  group_by: [dataset_name, scenario_id]
  development_split: dev
  locked_report_split: test
  tuning_allowed_on: [dev]
  reporting_allowed_on: [test]

contamination_controls:
  disallow_benchmark_labels_in_rag: true
  disallow_benchmark_rationales_in_rag: true
  disallow_transformed_benchmark_records_in_rag: true
  require_separate_prompt_notes_for_test: true

annotator_protocol:
  reviewers_required: 3
  agreement_metric: fleiss_kappa
  adjudication: majority_vote_then_faculty_review

statistical_analysis:
  primary_metric: macro_f1
  confidence_intervals:
    method: bootstrap
    iterations: 10000
    alpha: 0.05
  paired_tests:
    - name: paired_bootstrap_macro_f1
    - name: bowker_multiclass_symmetry
  binary_subtask_tests:
    - name: mcnemar_false_positive_vs_not
    - name: mcnemar_missed_detection_vs_not

evaluation:
  metrics:
    - macro_f1
    - precision_per_class
    - recall_per_class
    - benign_false_positive_rate
    - missed_detection_rate
    - abstain_or_escalate_rate
    - latency_p50
    - latency_p95
  output_dir: results/config_a_locked_local/
