# Config B: K2.5 Single-Agent + RAG
experiment:
  id: config_b
  name: "K2.5 Single-Agent with RAG"
  description: "Measures RAG impact on classification accuracy (compare vs Config A)"

model:
  provider: vllm
  name: moonshotai/Kimi-K2.5
  quantization: int4
  deterministic:
    temperature: 0.0
    seed: 42

orchestration:
  mode: single

rag:
  enabled: true
  top_k: 5
  search_mode: hybrid

evaluation:
  datasets:
    - data/datasets/cicids2017_alerts.json
    - data/datasets/cicids2018_alerts.json
    - data/datasets/beth_alerts.json
    - data/datasets/synthetic_mitre_alerts.json
    - data/datasets/false_positive_set.json
  output_dir: results/config_b/
