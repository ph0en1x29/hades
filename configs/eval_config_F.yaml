# Config F: Llama 3.1 70B Single-Agent + RAG
experiment:
  id: config_f
  name: "Llama 3.1 70B Single-Agent with RAG"
  description: "Dense model comparison — no MoE"

model:
  provider: vllm
  name: meta-llama/Llama-3.1-70B-Instruct
  quantization: awq
  deterministic:
    temperature: 0.0
    seed: 42

orchestration:
  mode: single

rag:
  enabled: true
  top_k: 5
  search_mode: hybrid

evaluation:
  datasets:
    - data/datasets/cicids2017_alerts.json
    - data/datasets/cicids2018_alerts.json
    - data/datasets/beth_alerts.json
    - data/datasets/synthetic_mitre_alerts.json
    - data/datasets/false_positive_set.json
  output_dir: results/config_f/
