# Hades v1 prototype configuration

system:
  name: hades
  version: 0.2.0
  stage: scoped_prototype
  log_level: INFO

interfaces:
  cli: true
  dashboard:
    enabled: true
    host: 0.0.0.0
    port: 8000

model:
  provider: vllm
  name: moonshotai/Kimi-K2.5
  status: candidate
  validated_for_local_eval: false
  context_window: 256000
  max_prompt_tokens: 20000  # Budget: 2K alert + 4K retrieved + 2K policy + 2K correlated + 10K reserve
  deterministic:
    temperature: 0.0
    seed: 42
  human_review:
    confidence_threshold: 0.70
    auto_escalate_threshold: 0.50

orchestration:
  mode: deterministic_pipeline
  adapter: none
  optional_future_adapter: openclaw
  max_retries: 1
  timeout_seconds: 90
  classifier:
    base_url: http://localhost:8001
    model: moonshotai/Kimi-K2.5
    timeout_seconds: 90
    temperature: 0.0
    max_tokens: 512
    seed: 42
    use_structured_prompt: false
    include_raw_log: true
    max_raw_log_chars: 2000

rag:
  enabled: true
  vector_store: qdrant
  deployment_mode: local
  collection_name: hades_threat_intel
  dense_embedding_model: BAAI/bge-small-en-v1.5
  sparse_embedding_model: Qdrant/bm25
  retrieval_mode: hybrid
  top_k: 5
  sources:
    - name: mitre_attack
      path: data/knowledge/mitre_attack
      enabled: true
    - name: curated_cve
      path: data/knowledge/curated_cve
      enabled: true

ingestion:
  mode: file_replay
  replay_dir: data/datasets/incoming
  accepted_formats: [json, jsonl]
  normalized_schema_version: unified_alert_v1
  parser_version: alert_normalization_v1

output:
  audit_store: data/audit.sqlite
  decision_dir: results/decisions
  write_jsonl: true
  evidence_trace: structured

evaluation:
  locked_test_required: true
  annotator_metric: fleiss_kappa
  statistical_tests:
    - paired_bootstrap
    - bowker

context:
  current_alert: 2000
  retrieved_evidence: 4000
  policy_instructions: 2000
  historical_summaries: 1000
