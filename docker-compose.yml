# Hades v1 prototype services
# Usage: docker compose up -d

version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  hades:
    build: .
    depends_on:
      - qdrant
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "8000:8000"
